<svg width="100%" height="110" viewBox="0 0 900 110" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

    <defs>
        <!-- Forged iron gradient -->
        <linearGradient id="ironGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2a2724"/>
            <stop offset="50%" stop-color="#4f4742"/>
            <stop offset="100%" stop-color="#2a2724"/>
        </linearGradient>

        <!-- Pulsing molten core -->
        <radialGradient id="hotCore">
            <stop offset="0%" stop-color="#ffd17a">
                <animate attributeName="stop-color"
                         values="#ffd17a; #ff9c3d; #ffd17a"
                         dur="2s"
                         repeatCount="indefinite"/>
            </stop>

            <stop offset="40%" stop-color="#ff8a2a">
                <animate attributeName="stop-color"
                         values="#ff8a2a; #c95d15; #ff8a2a"
                         dur="2s"
                         repeatCount="indefinite"/>
            </stop>

            <stop offset="70%" stop-color="#a03d0c" stop-opacity="0.6">
                <animate attributeName="stop-opacity"
                         values="0.6;0.3;0.6"
                         dur="2s"
                         repeatCount="indefinite"/>
            </stop>

            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
    </defs>

    <!-- Glowing iron bars -->
    <rect x="0" y="52" width="300" height="6" fill="url(#ironGradient)" rx="3">
        <animate attributeName="fill-opacity"
                 values="0.6;1;0.6"
                 dur="3s"
                 repeatCount="indefinite"/>
    </rect>

    <rect x="600" y="52" width="300" height="6" fill="url(#ironGradient)" rx="3">
        <animate attributeName="fill-opacity"
                 values="1;0.6;1"
                 dur="3s"
                 repeatCount="indefinite"/>
    </rect>

    <!-- Hot molten center -->
    <circle cx="450" cy="55" r="40" fill="url(#hotCore)">
        <animate attributeName="r"
                 values="38;42;38"
                 dur="2s"
                 repeatCount="indefinite"/>
    </circle>

    <!-- Forged ornamental shape -->
    <path d="
        M 390 55
        Q 410 25 430 55
        Q 450 15 470 55
        Q 490 25 510 55
        Q 490 85 470 55
        Q 450 95 430 55
        Q 410 85 390 55
        Z"
        fill="url(#ironGradient)"
        stroke="#1b1714"
        stroke-width="3">

        <animate attributeName="filter"
                 values="drop-shadow(0 0 4px rgba(255,150,50,0.6));
                         drop-shadow(0 0 10px rgba(255,120,30,0.9));
                         drop-shadow(0 0 4px rgba(255,150,50,0.6))"
                 dur="2s"
                 repeatCount="indefinite"/>
    </path>

    <!-- Flickering sparks -->
    <circle cx="420" cy="20" r="3" fill="#ffd17a">
        <animate attributeName="opacity"
                 values="1;0;1"
                 dur="0.8s"
                 repeatCount="indefinite"/>
    </circle>

    <circle cx="475" cy="15" r="2.5" fill="#ffc45a">
        <animate attributeName="opacity"
                 values="0;1;0"
                 dur="1.1s"
                 repeatCount="indefinite"/>
    </circle>

    <circle cx="445" cy="90" r="2" fill="#ff9c3a">
        <animate attributeName="opacity"
                 values="0;1;0"
                 dur="0.9s"
                 repeatCount="indefinite"/>
    </circle>

    <circle cx="490" cy="75" r="3" fill="#ffc873">
        <animate attributeName="opacity"
                 values="1;0;1"
                 dur="1.3s"
                 repeatCount="indefinite"/>
    </circle>

</svg>
